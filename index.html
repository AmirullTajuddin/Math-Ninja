<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Ninja</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🥷 Math Ninja</h1>

<div id="home">
<button onclick="openReport()">👨‍👩‍👧</button>

<h2>TAMBAH</h2>
<div class="grid">
<button onclick="setMode('add1')">1 digit + 1 digit</button>
<button onclick="setMode('add2')">2 digit + 2 digit</button>
<button onclick="setMode('add3')">3 digit + 3 digit</button>
</div>

<h2>DARAB</h2>
<div class="grid">
<button onclick="setMode('mul1')">1 × 1</button>
<button onclick="setMode('mul2')">2 × 1</button>
<button onclick="setMode('mul3')">2 × 2</button>
</div>

<h2>BAHAGI</h2>
<div class="grid">
<button onclick="setMode('div1')">2 digit ÷ 1 digit</button>
<button onclick="setMode('div2')">3 digit ÷ 1 digit</button>
</div>

<h3 id="selected"></h3>
<button onclick="startQuiz()">START</button>
</div>

<div id="quiz" style="display:none;">
<div id="timer">0s</div>
<div id="questions"></div>
<button onclick="submitQuiz()">SUBMIT</button>
</div>

<div id="result" style="display:none;"></div>
<div id="report" style="display:none;"></div>

<script src="app.js"></script>
</body>
</html>
