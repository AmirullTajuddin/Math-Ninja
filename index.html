<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Ninja</title>
<meta name="theme-color" content="#2F5D62">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Math Ninja">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png?v=1">
<link rel="apple-touch-icon" href="assets/icon-192.png?v=1">
<link rel="manifest" href="manifest.webmanifest?v=1">
<link rel="stylesheet" href="style.css?v=5">
</head>
<body>

<div id="home" class="home-shell">
<div class="home-card">
<div class="home-topbar">
<button class="icon-btn ranking-btn" onclick="openRanking()" title="Ranking" aria-label="Ranking">&#127942;</button>
<button class="icon-btn report-btn" onclick="openReport()" title="Parent Report" aria-label="Parent Report">&#128202;</button>
</div>

<div class="hero">
<div class="hero-badge">Math Practice Adventure</div>
<h1>Math Ninja</h1>
<p class="hero-text">Pilih latihan yang anda mahu, fokus kira betul-betul, dan cuba capai jawapan sempurna.</p>
</div>

<div class="section-block">
<h2>TAMBAH</h2>
<div class="grid">
<button class="mode-btn" data-mode="add1" onclick="setMode('add1', this)">1 digit + 1 digit</button>
<button class="mode-btn" data-mode="add2" onclick="setMode('add2', this)">2 digit + 2 digit</button>
<button class="mode-btn" data-mode="add3" onclick="setMode('add3', this)">3 digit + 3 digit</button>
</div>
</div>

<div class="section-block">
<h2>DARAB</h2>
<div class="grid">
<button class="mode-btn" data-mode="mul1" onclick="setMode('mul1', this)">1 x 1</button>
<button class="mode-btn" data-mode="mul2" onclick="setMode('mul2', this)">2 x 1</button>
<button class="mode-btn" data-mode="mul3" onclick="setMode('mul3', this)">2 x 2</button>
</div>
</div>

<div class="section-block">
<h2>BAHAGI</h2>
<div class="grid">
<button class="mode-btn" data-mode="div1" onclick="setMode('div1', this)">2 digit / 1 digit</button>
<button class="mode-btn" data-mode="div2" onclick="setMode('div2', this)">3 digit / 1 digit</button>
</div>
</div>

<div class="selection-bar">
<h3 id="selected">Choose a mode to begin</h3>
<button class="start-btn" onclick="startQuiz()">START</button>
</div>
</div>
</div>

<div id="quiz" style="display:none;">
<div id="timer">0s</div>
<div id="questions"></div>
<button onclick="submitQuiz()">SUBMIT</button>
</div>

<div id="result" style="display:none;"></div>
<div id="report" style="display:none;"></div>
<div id="ranking" style="display:none;"></div>

<script src="app.js?v=5"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
