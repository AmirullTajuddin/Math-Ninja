<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Ninja</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🥷 Math Ninja</h1>

<div id="home">
<button onclick="openReport()">👨‍👩‍👧</button>

<h2>TAMBAH</h2>
<div class="grid">
<button class="mode-btn" onclick="setMode('add1', this)">1 digit + 1 digit</button>
<button class="mode-btn" onclick="setMode('add2', this)">2 digit + 2 digit</button>
<button class="mode-btn" onclick="setMode('add3', this)">3 digit + 3 digit</button>
</div>

<h2>DARAB</h2>
<div class="grid">
<button class="mode-btn" onclick="setMode('mul1', this)">1 × 1</button>
<button class="mode-btn" onclick="setMode('mul2', this)">2 × 1</button>
<button class="mode-btn" onclick="setMode('mul3', this)">2 × 2</button>
</div>

<h2>BAHAGI</h2>
<div class="grid">
<button class="mode-btn" onclick="setMode('div1', this)">2 digit ÷ 1 digit</button>
<button class="mode-btn" onclick="setMode('div2', this)">3 digit ÷ 1 digit</button>
</div>

<h3 id="selected"></h3>
<button onclick="startQuiz()">START</button>
</div>

<div id="quiz" style="display:none;">
<div id="timer">0s</div>
<div id="questions"></div>
<button onclick="submitQuiz()">SUBMIT</button>
</div>

<div id="result" style="display:none;"></div>
<div id="report" style="display:none;"></div>

<script src="app.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
